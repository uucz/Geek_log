<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geek_log - 极客时间课程浏览</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">Geek<span>_log</span></div>
      <div class="search-box">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" placeholder="搜索课程..." aria-label="搜索课程">
      </div>
      <div class="header-actions">
        <span class="stats"></span>
        <button class="theme-toggle" aria-label="切换主题"></button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="category-tabs"></div>
    <div class="course-grid">
      <div class="loading">加载课程数据中...</div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>App.init();</script>
</body>
</html>
